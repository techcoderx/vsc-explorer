map $http_user_agent $is_preview_bot {
  default 0;
  "~*(Discordbot|Twitterbot|facebookexternalhit|Slackbot|LinkedInBot|TelegramBot|WhatsApp|Applebot|SkypeUriPreview|redditbot|Pinterest|vkShare|W3C_Validator|Googlebot-Image)" 1;
}

server {
  listen 8080;

  location ~*(/be-api/v1/haf) {
    rewrite_log on;
    rewrite ^/be-api/v1/haf/user/([^/]+)/witness /rpc/get_witness?username=$1 break;
    rewrite ^/be-api/v1/haf/user/([^/]+)/history/([^/]+)/([^/]+)/([^/]+) /rpc/get_op_history_by_l1_user?username=$1&count=$2&last_nonce=$3&bitmask_filter=$4 break;
    rewrite ^/be-api/v1/haf/user/([^/]+)/history/([^/]+)/([^/]+) /rpc/get_op_history_by_l1_user?username=$1&count=$2&last_nonce=$3 break;
    rewrite ^/be-api/v1/haf/user/([^/]+)/history/([^/]+) /rpc/get_op_history_by_l1_user?username=$1&count=$2 break;
    rewrite ^/be-api/v1/haf/user/([^/]+)/history /rpc/get_op_history_by_l1_user?username=$1 break;
    rewrite ^/be-api/v1/haf/user/([^/]+) /rpc/get_l1_user?username=$1 break;
    rewrite ^/be-api/v1/haf/latest-ops/([^/]+)/([^/]+)/([^/]+) /rpc/list_latest_ops?count=$1&with_payload=$2&bitmask_filter=$3 break;
    rewrite ^/be-api/v1/haf/latest-ops/([^/]+)/([^/]+) /rpc/list_latest_ops?count=$1&with_payload=$2 break;
    rewrite ^/be-api/v1/haf/latest-ops/([^/]+) /rpc/list_latest_ops?count=$1 break;
    rewrite ^/be-api/v1/haf/latest-ops /rpc/list_latest_ops break;
    rewrite ^/be-api/v1/haf / break;

    proxy_pass http://magi-haf-postgrest:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_hide_header Content-Location;
    proxy_set_header  Connection "";
    proxy_http_version 1.1;
  }

  location ~*(/be-api/|/cv-api/) {
    proxy_pass http://magi-bb:8080;
  }

  location /api/v1/graphql {
    proxy_pass http://magi-1:8080;
  }

  location /sandbox {
    proxy_pass http://magi-1:8080;
  }

  location /hasura/v1/graphql {
    proxy_pass http://magi-hasura:8080/v1/graphql;
  }

  location ~*(/assets/|/img/|/locales/) {
    root /html/;
    try_files $uri =404;
  }

  location / {
    error_page 418 = @og_renderer;
    recursive_error_pages on;
    if ($is_preview_bot) { return 418; }
    root /html;
    try_files /index.html =404;
  }

  location @og_renderer {
    proxy_pass http://magi-bb:8080/og$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
  }
}